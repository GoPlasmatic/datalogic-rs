# Dependabot config for the datalogic-rs monorepo.
#
# Each binding owns its own Cargo workspace (root excludes bindings/wasm,
# python, c, node) — so we register every Cargo manifest separately.
# `versioning-strategy: increase-if-necessary` keeps the floor versions in
# `crates/datalogic-rs/Cargo.toml` honest with the minimal-versions CI
# job: PRs only bump the floor when the new range requires it.
version: 2
updates:
  # ──────────── Cargo ────────────
  - package-ecosystem: cargo
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    labels: [dependencies, rust]
    groups:
      patch:
        update-types: [patch]
      minor:
        update-types: [minor]
    versioning-strategy: increase-if-necessary

  - package-ecosystem: cargo
    directory: /bindings/wasm
    schedule:
      interval: weekly
    open-pull-requests-limit: 3
    labels: [dependencies, rust, wasm]

  - package-ecosystem: cargo
    directory: /bindings/python
    schedule:
      interval: weekly
    open-pull-requests-limit: 3
    labels: [dependencies, rust, python]

  - package-ecosystem: cargo
    directory: /bindings/c
    schedule:
      interval: weekly
    open-pull-requests-limit: 3
    labels: [dependencies, rust, c-abi]

  - package-ecosystem: cargo
    directory: /bindings/node
    schedule:
      interval: weekly
    open-pull-requests-limit: 3
    labels: [dependencies, rust, node]

  # ──────────── npm ────────────
  # The UI is the only npm tree with substantive runtime deps; bindings/node
  # only carries `@napi-rs/cli` as a devDep. Limit npm noise accordingly.
  - package-ecosystem: npm
    directory: /ui
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    labels: [dependencies, javascript, ui]
    groups:
      patch:
        update-types: [patch]
      minor:
        update-types: [minor]

  - package-ecosystem: npm
    directory: /bindings/node
    schedule:
      interval: weekly
    open-pull-requests-limit: 2
    labels: [dependencies, javascript, node]

  # ──────────── Maven ────────────
  # jackson-databind is compile-scope, so it reaches consumers of
  # io.github.goplasmatic:datalogic transitively — its CVEs are ours to
  # ship a fix for, not just ours to tolerate. Left unregistered until
  # CVE-2026-54515 sat open on 2.22.0 with no PR to bump it.
  - package-ecosystem: maven
    directory: /bindings/jvm
    schedule:
      interval: weekly
    open-pull-requests-limit: 3
    labels: [dependencies, jvm]

  # ──────────── NuGet ────────────
  # Same exported-dependency argument as Maven: src/Datalogic carries a
  # System.Text.Json PackageReference that flows to NuGet consumers.
  - package-ecosystem: nuget
    directory: /bindings/dotnet
    schedule:
      interval: weekly
    open-pull-requests-limit: 3
    labels: [dependencies, dotnet]

  # ──────────── Composer ────────────
  # Thin by design: runtime `require` is php + ext-ffi + ext-json, so this
  # only really tracks the phpunit devDep. Registered so a future runtime
  # dep is covered from day one rather than retrofitted after an alert.
  - package-ecosystem: composer
    directory: /bindings/php
    schedule:
      interval: weekly
    open-pull-requests-limit: 2
    labels: [dependencies, php]

  # ──────────── Go modules ────────────
  # go.mod has zero `require` entries today (the binding is cgo over the C
  # ABI, no external Go deps), so expect no PRs. Same rationale as Composer:
  # cheap to register now, easy to forget later.
  - package-ecosystem: gomod
    directory: /bindings/go
    schedule:
      interval: weekly
    open-pull-requests-limit: 2
    labels: [dependencies, go]

  # ──────────── GitHub Actions ────────────
  # Pin action versions sharply; bump on Dependabot's cadence rather than
  # via floating `@v4` aliases that can change underfoot.
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    labels: [dependencies, github-actions]
