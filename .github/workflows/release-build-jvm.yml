name: _release-build-jvm

# Internal reusable workflow — called by release.yml's `build-jvm`
# job. Consumes the cdylib matrix artifacts, stages them under
# bindings/jvm/src/main/resources/<os-arch>/ (the classpath-root layout
# the binding's own loader extracts from — it searches
# `<os-arch>/<libname>` at the classpath root, NOT `META-INF/native/`;
# the <os-arch> strings deliberately match JNA's historical
# Platform.RESOURCE_PREFIX naming so this staging never changed across
# the JNA→FFM rewrite), runs `mvn test`, then `mvn package` and uploads
# the resulting JAR.

on:
  workflow_call:

jobs:
  package:
    name: mvn package
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '25'

      - name: Cache Maven repository
        uses: actions/cache@v5
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-m2-${{ hashFiles('bindings/jvm/pom.xml') }}
          restore-keys: ${{ runner.os }}-m2-

      - name: Download all cdylib artifacts
        uses: actions/download-artifact@v8
        with:
          path: cdylib/
          pattern: c-cdylib-*
          merge-multiple: true

      # Map the matrix's `<os>-<arch>` to the binding loader's
      # platform-resource naming (JNA's historical RESOURCE_PREFIX
      # strings, kept identical across the FFM rewrite) and stage native
      # libs at the classpath root under <os-arch>/, which is where the
      # loader auto-extracts from. Shared with release.yml's publish-jvm
      # job so the two layouts cannot drift apart.
      - name: Stage native libs under <os-arch>/ (classpath root)
        shell: bash
        run: bash scripts/stage-jvm-natives.sh cdylib

      # Composite: setup Rust + cargo cache + build the host's cdylib so
      # `mvn test` can dlopen() it during the smoke run.
      - uses: ./.github/actions/c-abi-host

      - name: Test
        working-directory: bindings/jvm
        run: mvn -B test

      - name: Package
        working-directory: bindings/jvm
        run: mvn -B -DskipTests package

      # Load the natives the way a Maven Central consumer does: from the
      # packaged JAR's classpath-root <os-arch>/ resources, with
      # datalogic.library.path UNSET. `mvn test` above points it at the
      # in-tree cdylib, so it never exercises the packaged layout; this
      # step is the only guard on the resource path staged into the JAR.
      - name: Smoke-test the packaged JAR (classpath-root native load)
        working-directory: bindings/jvm
        run: |
          set -euo pipefail
          JAR=$(ls target/datalogic-*.jar | grep -Ev '(sources|javadoc)' | head -1)
          echo "Testing packaged JAR: $JAR"
          mvn -B -q dependency:build-classpath -Dmdep.outputFile=deps-cp.txt
          CP="$JAR:$(cat deps-cp.txt)"
          mkdir -p smoke
          cat > smoke/Smoke.java <<'EOF'
          import com.goplasmatic.datalogic.Engine;
          public class Smoke {
              public static void main(String[] args) {
                  try (Engine engine = new Engine()) {
                      String out = engine.apply("{\"+\":[1,2]}", "{}");
                      if (!"3".equals(out)) {
                          throw new RuntimeException("unexpected result: " + out);
                      }
                      System.out.println("packaged-JAR native load OK: " + out);
                  }
              }
          }
          EOF
          javac -cp "$CP" -d smoke smoke/Smoke.java
          # No -Ddatalogic.library.path: force the binding's loader to
          # extract the native from the JAR's classpath-root resources,
          # exactly as a published consumer would.
          java --enable-native-access=ALL-UNNAMED -cp "$CP:smoke" Smoke

      - name: Upload JARs
        uses: actions/upload-artifact@v7
        with:
          name: jvm-jars
          path: |
            bindings/jvm/target/datalogic-*.jar
          if-no-files-found: error
