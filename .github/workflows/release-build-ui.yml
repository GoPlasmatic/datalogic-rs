name: _release-build-ui

# Internal reusable workflow — called by release.yml's `build-ui` job.
# Consumes the `wasm-pkg` artifact (produced by release-build-wasm.yml)
# and produces `ui-package` containing the npm-publishable tree.

on:
  workflow_call:
    inputs:
      version:
        description: "Release version, used to bump UI's package.json and pin its WASM dep"
        required: true
        type: string

jobs:
  build:
    name: Build UI
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download wasm-pkg artifact
        uses: actions/download-artifact@v4
        with:
          name: wasm-pkg
          path: bindings/wasm/pkg/

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Sync UI version + WASM dep
        run: |
          cd ui
          # Bump UI's own version
          npm version "${{ inputs.version }}" --no-git-tag-version --allow-same-version
          # Pin @goplasmatic/datalogic-wasm to the same version we're publishing
          # so the released UI references the matching WASM (no skew).
          npm pkg set "dependencies.@goplasmatic/datalogic-wasm=${{ inputs.version }}"

      # Wire the freshly-built local WASM artifact into ui/node_modules
      # BEFORE running npm install. With the symlink present and its
      # version matching ui/package.json's pin, `npm install`
      # preserves it instead of fetching from the registry — critical
      # because we run BEFORE publish-wasm.
      - name: Link local WASM package into UI
        run: |
          cd bindings/wasm/pkg && npm link
          cd ../../ui && npm link @goplasmatic/datalogic-wasm

      - name: Install UI dependencies
        run: cd ui && npm install

      - name: Build UI library
        run: cd ui && npm run build:lib

      # Bundle only the files `npm publish` actually packs — everything
      # listed in package.json's `files` field plus the package manifest,
      # README, LICENSE. node_modules is intentionally excluded (it
      # carries the linked-local WASM symlink which would not match the
      # published WASM dep).
      - name: Upload ui-package artifact
        uses: actions/upload-artifact@v4
        with:
          name: ui-package
          path: |
            ui/package.json
            ui/package-lock.json
            ui/README.md
            ui/LICENSE
            ui/dist/
          if-no-files-found: error
