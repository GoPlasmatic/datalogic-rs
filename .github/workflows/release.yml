name: Release

# Single unified release workflow. One `git tag v5.x.y && git push --tags`
# fires this and ships every artifact in the monorepo.
#
# Flow:
#   validate  →  publish-crate  →  ┬─ publish-wasm  →  publish-ui
#                                  ├─ python-build-wheels (matrix) ─┐
#                                  └─ python-build-sdist            ├─ publish-python
#                                                                   ┘
#                                  └────────────── github-release (waits for all) ──┘
#
# Tests run once in `validate`; publishing the core crate happens before
# any binding goes out (so a binding never references an unpublished
# core version on its package registry); language bindings then fan out
# in parallel.
on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  validate:
    name: Validate
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract version
        id: version
        run: |
          VERSION=$(grep '^version = ' packages/core/Cargo.toml | head -1 | sed 's/version = "\(.*\)"/\1/')
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "packages/core/Cargo.toml version: $VERSION"

      - name: Validate tag matches version
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          VERSION="${{ steps.version.outputs.version }}"
          if [ "$TAG_VERSION" != "$VERSION" ]; then
            echo "::error::Tag $GITHUB_REF_NAME does not match packages/core/Cargo.toml version $VERSION"
            exit 1
          fi
          echo "Tag $GITHUB_REF_NAME matches packages/core/Cargo.toml version $VERSION"

      # Python ships under the same `v*` tag as core, so its Cargo.toml +
      # pyproject.toml must agree. Catch a forgotten bump here, before
      # core is published and the tag is impossible to retract cleanly.
      - name: Validate Python package versions match core
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          PYCARGO=$(grep '^version = ' packages/python/Cargo.toml | head -1 | sed 's/version = "\(.*\)"/\1/')
          PYPROJECT=$(grep '^version = ' packages/python/pyproject.toml | head -1 | sed 's/version = "\(.*\)"/\1/')
          if [ "$PYCARGO" != "$VERSION" ]; then
            echo "::error::packages/python/Cargo.toml ($PYCARGO) does not match core ($VERSION) — bump together"
            exit 1
          fi
          if [ "$PYPROJECT" != "$VERSION" ]; then
            echo "::error::packages/python/pyproject.toml ($PYPROJECT) does not match core ($VERSION) — bump together"
            exit 1
          fi
          echo "core $VERSION matches python Cargo.toml + pyproject.toml"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('Cargo.toml', 'packages/core/Cargo.toml', 'tools/benchmark/Cargo.toml') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Run clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Run tests
        run: cargo test --workspace

  publish-crate:
    name: Publish core to crates.io
    needs: validate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Check if version exists on crates.io
        id: check
        run: |
          VERSION="${{ needs.validate.outputs.version }}"
          PUBLISHED=$(cargo search datalogic-rs --limit 1 2>/dev/null | grep "^datalogic-rs" | sed 's/.*= "\(.*\)".*/\1/' || echo "")
          if [ "$VERSION" = "$PUBLISHED" ]; then
            echo "Version $VERSION already published to crates.io, skipping"
            echo "skip=true" >> $GITHUB_OUTPUT
          else
            echo "Publishing version $VERSION to crates.io"
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

      - name: Publish
        if: steps.check.outputs.skip != 'true'
        run: cargo publish --manifest-path packages/core/Cargo.toml
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CRATES_IO_TOKEN }}

  # ---------------------------------------------------------------- WASM + UI
  # WASM uses `path = "../core"` so it doesn't strictly need the crates.io
  # publish to succeed first, but `needs: publish-crate` enforces the
  # invariant: a binding never ships ahead of its core. UI then chains
  # off WASM (it bundles the wasm-pkg artifact).

  publish-wasm:
    name: Publish WASM to npm
    needs: [validate, publish-crate]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Install wasm-pack
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh

      - name: Install binaryen
        run: sudo apt-get update && sudo apt-get install -y binaryen

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            packages/wasm/target/
          key: ${{ runner.os }}-wasm-${{ hashFiles('packages/wasm/Cargo.toml') }}
          restore-keys: ${{ runner.os }}-wasm-

      - name: Build WASM
        run: cd packages/wasm && ./build.sh

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Check if version exists on npm
        id: check
        run: |
          VERSION="${{ needs.validate.outputs.version }}"
          if npm view "@goplasmatic/datalogic@$VERSION" version 2>/dev/null; then
            echo "Version $VERSION already published to npm, skipping"
            echo "skip=true" >> $GITHUB_OUTPUT
          else
            echo "Publishing version $VERSION to npm"
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

      - name: Publish to npm
        if: steps.check.outputs.skip != 'true'
        run: cd packages/wasm/pkg && npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Upload wasm-pkg artifact
        uses: actions/upload-artifact@v4
        with:
          name: wasm-pkg
          path: packages/wasm/pkg/

  publish-ui:
    name: Publish UI to npm
    needs: [validate, publish-wasm]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download wasm-pkg artifact
        uses: actions/download-artifact@v4
        with:
          name: wasm-pkg
          path: packages/wasm/pkg/

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Sync UI version + WASM dep from packages/core/Cargo.toml
        run: |
          VERSION="${{ needs.validate.outputs.version }}"
          cd packages/ui
          # Bump ui's own version
          npm version "$VERSION" --no-git-tag-version --allow-same-version
          # Pin the @goplasmatic/datalogic dep to the same version we are
          # about to publish (the wasm publish job runs first). Without
          # this, the published ui would still reference an older WASM.
          npm pkg set "dependencies.@goplasmatic/datalogic=$VERSION"

      # Wire the freshly-built local WASM artifact into ui/node_modules
      # BEFORE running npm install. With the symlink already present and
      # its version matching packages/ui/package.json's pin, `npm install`
      # preserves it instead of fetching from the registry — important
      # because publish-wasm may have just run and the new $VERSION may
      # not be indexed on npm yet.
      - name: Link local WASM package into UI
        run: |
          cd packages/wasm/pkg && npm link
          cd ../../ui && npm link @goplasmatic/datalogic

      - name: Install UI dependencies
        run: cd packages/ui && npm install

      - name: Build UI library
        run: cd packages/ui && npm run build:lib

      - name: Check if version exists on npm
        id: check
        run: |
          VERSION="${{ needs.validate.outputs.version }}"
          if npm view "@goplasmatic/datalogic-ui@$VERSION" version 2>/dev/null; then
            echo "Version $VERSION already published to npm, skipping"
            echo "skip=true" >> $GITHUB_OUTPUT
          else
            echo "Publishing version $VERSION to npm"
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

      - name: Publish to npm
        if: steps.check.outputs.skip != 'true'
        run: cd packages/ui && npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  # ------------------------------------------------------------------- Python
  # Python wheels build in parallel with the WASM/UI chain. abi3-py310
  # means one wheel per (os, arch) covers CPython 3.10+; matrix produces
  # 7 wheels (manylinux + musllinux × x86_64/aarch64, macOS x86_64/arm64,
  # Windows x86_64). sdist builds in a separate cheap job. Publish
  # collects both and uploads via OIDC trusted publishing.

  python-build-wheels:
    name: Build Python wheel (${{ matrix.target.os }} / ${{ matrix.target.arch }} / ${{ matrix.target.libc }})
    needs: [validate, publish-crate]
    runs-on: ${{ matrix.target.runner }}
    strategy:
      fail-fast: false
      matrix:
        target:
          - { os: linux,   arch: x86_64,  libc: manylinux, runner: ubuntu-latest,  target: x86_64-unknown-linux-gnu,    manylinux: "2014" }
          - { os: linux,   arch: aarch64, libc: manylinux, runner: ubuntu-latest,  target: aarch64-unknown-linux-gnu,   manylinux: "2014" }
          - { os: linux,   arch: x86_64,  libc: musllinux, runner: ubuntu-latest,  target: x86_64-unknown-linux-musl,   manylinux: "musllinux_1_2" }
          - { os: linux,   arch: aarch64, libc: musllinux, runner: ubuntu-latest,  target: aarch64-unknown-linux-musl,  manylinux: "musllinux_1_2" }
          - { os: macos,   arch: x86_64,  libc: "",         runner: macos-13,       target: x86_64-apple-darwin,         manylinux: "off" }
          - { os: macos,   arch: arm64,   libc: "",         runner: macos-14,       target: aarch64-apple-darwin,        manylinux: "off" }
          - { os: windows, arch: x86_64,  libc: "",         runner: windows-latest, target: x86_64-pc-windows-msvc,      manylinux: "off" }
    steps:
      - uses: actions/checkout@v4

      - name: Build wheel
        uses: PyO3/maturin-action@v1
        with:
          # Pin maturin so a release months from now produces the same
          # wheels. Bump deliberately when needed.
          maturin-version: "1.7.4"
          working-directory: packages/python
          target: ${{ matrix.target.target }}
          args: --release --out dist
          # `manylinux` doubles as the musllinux selector — values like
          # "musllinux_1_2" are interpreted by the action.
          manylinux: ${{ matrix.target.manylinux }}

      - name: Upload wheel
        uses: actions/upload-artifact@v4
        with:
          name: python-wheels-${{ matrix.target.os }}-${{ matrix.target.arch }}-${{ matrix.target.libc }}
          path: packages/python/dist/*.whl

  python-build-sdist:
    name: Build Python sdist
    needs: [validate, publish-crate]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build sdist
        uses: PyO3/maturin-action@v1
        with:
          maturin-version: "1.7.4"
          working-directory: packages/python
          command: sdist
          args: --out dist

      - name: Upload sdist
        uses: actions/upload-artifact@v4
        with:
          name: python-sdist
          path: packages/python/dist/*.tar.gz

  publish-python:
    name: Publish Python to PyPI
    needs: [validate, python-build-wheels, python-build-sdist]
    runs-on: ubuntu-latest
    # `pypi` GitHub Environment provides the manual approval gate
    # (configure in repo Settings → Environments → pypi → required
    # reviewers). A stray tag push won't publish unattended.
    environment:
      name: pypi
      url: https://pypi.org/p/datalogic-py
    # OIDC trusted publishing — requires a PyPI publisher (or pending
    # publisher) configured for this repo + workflow file + environment.
    # No API token used.
    permissions:
      id-token: write
    steps:
      - name: Download all Python artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          pattern: python-*
          merge-multiple: true

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist
          # `skip-existing` avoids a hard failure if a wheel was already
          # uploaded by an earlier (partial) run for the same version.
          skip-existing: true

  github-release:
    name: Create GitHub Release
    needs: [validate, publish-crate, publish-wasm, publish-ui, publish-python]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create release
        run: |
          VERSION="${{ needs.validate.outputs.version }}"
          gh release create "v$VERSION" \
            --title "v$VERSION" \
            --generate-notes \
            --verify-tag
        env:
          GH_TOKEN: ${{ github.token }}
