name: Release

# Single unified release workflow. One `git tag v5.x.y && git push --tags`
# fires this and ships every artifact in the monorepo.
#
# Flow:
#   validate  →  publish-crate  →  ┬─ publish-wasm  →  publish-ui
#                                  ├─ python-build-wheels (matrix) ─┐
#                                  ├─ python-build-sdist            ├─ publish-python
#                                  ├─ go-build-staticlib (matrix) ──┴─ publish-go
#                                  │
#                                  └────────────── github-release (waits for all) ──┘
#
# Tests run once in `validate`; publishing the core crate happens before
# any binding goes out (so a binding never references an unpublished
# core version on its package registry); language bindings then fan out
# in parallel.
#
# The Go binding ships as a Git tag (`packages/go/vX.Y.Z`) rather than to
# a package registry. The matrix builds the C ABI staticlib for every
# supported (os, arch); publish-go stages all five into packages/go/lib/
# on a synthetic commit and pushes the subdirectory-module tag. The
# shared C ABI matrix is reusable — future PHP and JVM bindings will hang
# off the same staticlib/cdylib outputs.
on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  validate:
    name: Validate
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract version
        id: version
        run: |
          VERSION=$(grep '^version = ' packages/core/Cargo.toml | head -1 | sed 's/version = "\(.*\)"/\1/')
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "packages/core/Cargo.toml version: $VERSION"

      - name: Validate tag matches version
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          VERSION="${{ steps.version.outputs.version }}"
          if [ "$TAG_VERSION" != "$VERSION" ]; then
            echo "::error::Tag $GITHUB_REF_NAME does not match packages/core/Cargo.toml version $VERSION"
            exit 1
          fi
          echo "Tag $GITHUB_REF_NAME matches packages/core/Cargo.toml version $VERSION"

      # Python ships under the same `v*` tag as core, so its Cargo.toml +
      # pyproject.toml must agree. Catch a forgotten bump here, before
      # core is published and the tag is impossible to retract cleanly.
      - name: Validate Python package versions match core
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          PYCARGO=$(grep '^version = ' packages/python/Cargo.toml | head -1 | sed 's/version = "\(.*\)"/\1/')
          PYPROJECT=$(grep '^version = ' packages/python/pyproject.toml | head -1 | sed 's/version = "\(.*\)"/\1/')
          if [ "$PYCARGO" != "$VERSION" ]; then
            echo "::error::packages/python/Cargo.toml ($PYCARGO) does not match core ($VERSION) — bump together"
            exit 1
          fi
          if [ "$PYPROJECT" != "$VERSION" ]; then
            echo "::error::packages/python/pyproject.toml ($PYPROJECT) does not match core ($VERSION) — bump together"
            exit 1
          fi
          echo "core $VERSION matches python Cargo.toml + pyproject.toml"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('Cargo.toml', 'packages/core/Cargo.toml', 'tools/benchmark/Cargo.toml') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Run clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Run tests
        run: cargo test --workspace

  publish-crate:
    name: Publish core to crates.io
    needs: validate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Check if version exists on crates.io
        id: check
        run: |
          VERSION="${{ needs.validate.outputs.version }}"
          PUBLISHED=$(cargo search datalogic-rs --limit 1 2>/dev/null | grep "^datalogic-rs" | sed 's/.*= "\(.*\)".*/\1/' || echo "")
          if [ "$VERSION" = "$PUBLISHED" ]; then
            echo "Version $VERSION already published to crates.io, skipping"
            echo "skip=true" >> $GITHUB_OUTPUT
          else
            echo "Publishing version $VERSION to crates.io"
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

      - name: Publish
        if: steps.check.outputs.skip != 'true'
        run: cargo publish --manifest-path packages/core/Cargo.toml
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CRATES_IO_TOKEN }}

  # ---------------------------------------------------------------- WASM + UI
  # WASM uses `path = "../core"` so it doesn't strictly need the crates.io
  # publish to succeed first, but `needs: publish-crate` enforces the
  # invariant: a binding never ships ahead of its core. UI then chains
  # off WASM (it bundles the wasm-pkg artifact).

  publish-wasm:
    name: Publish WASM to npm
    needs: [validate, publish-crate]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Install wasm-pack
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh

      - name: Install binaryen
        run: sudo apt-get update && sudo apt-get install -y binaryen

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            packages/wasm/target/
          key: ${{ runner.os }}-wasm-${{ hashFiles('packages/wasm/Cargo.toml') }}
          restore-keys: ${{ runner.os }}-wasm-

      - name: Build WASM
        run: cd packages/wasm && ./build.sh

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Check if version exists on npm
        id: check
        run: |
          VERSION="${{ needs.validate.outputs.version }}"
          if npm view "@goplasmatic/datalogic@$VERSION" version 2>/dev/null; then
            echo "Version $VERSION already published to npm, skipping"
            echo "skip=true" >> $GITHUB_OUTPUT
          else
            echo "Publishing version $VERSION to npm"
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

      - name: Publish to npm
        if: steps.check.outputs.skip != 'true'
        run: cd packages/wasm/pkg && npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Upload wasm-pkg artifact
        uses: actions/upload-artifact@v4
        with:
          name: wasm-pkg
          path: packages/wasm/pkg/

  publish-ui:
    name: Publish UI to npm
    needs: [validate, publish-wasm]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download wasm-pkg artifact
        uses: actions/download-artifact@v4
        with:
          name: wasm-pkg
          path: packages/wasm/pkg/

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Sync UI version + WASM dep from packages/core/Cargo.toml
        run: |
          VERSION="${{ needs.validate.outputs.version }}"
          cd packages/ui
          # Bump ui's own version
          npm version "$VERSION" --no-git-tag-version --allow-same-version
          # Pin the @goplasmatic/datalogic dep to the same version we are
          # about to publish (the wasm publish job runs first). Without
          # this, the published ui would still reference an older WASM.
          npm pkg set "dependencies.@goplasmatic/datalogic=$VERSION"

      # Wire the freshly-built local WASM artifact into ui/node_modules
      # BEFORE running npm install. With the symlink already present and
      # its version matching packages/ui/package.json's pin, `npm install`
      # preserves it instead of fetching from the registry — important
      # because publish-wasm may have just run and the new $VERSION may
      # not be indexed on npm yet.
      - name: Link local WASM package into UI
        run: |
          cd packages/wasm/pkg && npm link
          cd ../../ui && npm link @goplasmatic/datalogic

      - name: Install UI dependencies
        run: cd packages/ui && npm install

      - name: Build UI library
        run: cd packages/ui && npm run build:lib

      - name: Check if version exists on npm
        id: check
        run: |
          VERSION="${{ needs.validate.outputs.version }}"
          if npm view "@goplasmatic/datalogic-ui@$VERSION" version 2>/dev/null; then
            echo "Version $VERSION already published to npm, skipping"
            echo "skip=true" >> $GITHUB_OUTPUT
          else
            echo "Publishing version $VERSION to npm"
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

      - name: Publish to npm
        if: steps.check.outputs.skip != 'true'
        run: cd packages/ui && npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  # ------------------------------------------------------------------- Python
  # Python wheels build in parallel with the WASM/UI chain. abi3-py310
  # means one wheel per (os, arch) covers CPython 3.10+; matrix produces
  # 7 wheels (manylinux + musllinux × x86_64/aarch64, macOS x86_64/arm64,
  # Windows x86_64). sdist builds in a separate cheap job. Publish
  # collects both and uploads via OIDC trusted publishing.

  python-build-wheels:
    name: Build Python wheel (${{ matrix.target.os }} / ${{ matrix.target.arch }} / ${{ matrix.target.libc }})
    needs: [validate, publish-crate]
    runs-on: ${{ matrix.target.runner }}
    strategy:
      fail-fast: false
      matrix:
        target:
          - { os: linux,   arch: x86_64,  libc: manylinux, runner: ubuntu-latest,  target: x86_64-unknown-linux-gnu,    manylinux: "2014" }
          - { os: linux,   arch: aarch64, libc: manylinux, runner: ubuntu-latest,  target: aarch64-unknown-linux-gnu,   manylinux: "2014" }
          - { os: linux,   arch: x86_64,  libc: musllinux, runner: ubuntu-latest,  target: x86_64-unknown-linux-musl,   manylinux: "musllinux_1_2" }
          - { os: linux,   arch: aarch64, libc: musllinux, runner: ubuntu-latest,  target: aarch64-unknown-linux-musl,  manylinux: "musllinux_1_2" }
          - { os: macos,   arch: x86_64,  libc: "",         runner: macos-13,       target: x86_64-apple-darwin,         manylinux: "off" }
          - { os: macos,   arch: arm64,   libc: "",         runner: macos-14,       target: aarch64-apple-darwin,        manylinux: "off" }
          - { os: windows, arch: x86_64,  libc: "",         runner: windows-latest, target: x86_64-pc-windows-msvc,      manylinux: "off" }
    steps:
      - uses: actions/checkout@v4

      - name: Build wheel
        uses: PyO3/maturin-action@v1
        with:
          # Pin maturin so a release months from now produces the same
          # wheels. Bump deliberately when needed.
          maturin-version: "1.7.4"
          working-directory: packages/python
          target: ${{ matrix.target.target }}
          args: --release --out dist
          # `manylinux` doubles as the musllinux selector — values like
          # "musllinux_1_2" are interpreted by the action.
          manylinux: ${{ matrix.target.manylinux }}

      - name: Upload wheel
        uses: actions/upload-artifact@v4
        with:
          name: python-wheels-${{ matrix.target.os }}-${{ matrix.target.arch }}-${{ matrix.target.libc }}
          path: packages/python/dist/*.whl

  python-build-sdist:
    name: Build Python sdist
    needs: [validate, publish-crate]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build sdist
        uses: PyO3/maturin-action@v1
        with:
          maturin-version: "1.7.4"
          working-directory: packages/python
          command: sdist
          args: --out dist

      - name: Upload sdist
        uses: actions/upload-artifact@v4
        with:
          name: python-sdist
          path: packages/python/dist/*.tar.gz

  publish-python:
    name: Publish Python to PyPI
    needs: [validate, python-build-wheels, python-build-sdist]
    runs-on: ubuntu-latest
    # `pypi` GitHub Environment provides the manual approval gate
    # (configure in repo Settings → Environments → pypi → required
    # reviewers). A stray tag push won't publish unattended.
    environment:
      name: pypi
      url: https://pypi.org/p/datalogic-py
    # OIDC trusted publishing — requires a PyPI publisher (or pending
    # publisher) configured for this repo + workflow file + environment.
    # No API token used.
    permissions:
      id-token: write
    steps:
      - name: Download all Python artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          pattern: python-*
          merge-multiple: true

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist
          # `skip-existing` avoids a hard failure if a wheel was already
          # uploaded by an earlier (partial) run for the same version.
          skip-existing: true

  # ----------------------------------------------------------------------- Go
  # Go modules don't have a registry — `go get` fetches source from the
  # repository at a given tag, then cgo links against whatever's in the
  # tree. We solve this by (a) building libdatalogic_c.a for every
  # supported (os, arch) in a matrix, (b) staging them into
  # packages/go/lib/<os>_<arch>/ on a synthetic commit, and (c) pushing
  # a `packages/go/vX.Y.Z` tag pointing at that commit. The synthetic
  # commit never lands on `main` — it's only reachable through the tag.
  #
  # End consumers do `go get github.com/.../packages/go@vX.Y.Z` and get
  # the staticlib for their platform automatically; the cgo build tags
  # in packages/go/cgo_<os>_<arch>.go select the right one.

  go-build-staticlib:
    name: Go staticlib (${{ matrix.target.os }}/${{ matrix.target.arch }})
    needs: [validate, publish-crate]
    runs-on: ${{ matrix.target.runner }}
    strategy:
      fail-fast: false
      matrix:
        target:
          # `native: true` — the runner can execute the built binary, so we
          # run `go test` against it before uploading.
          # `native: false` — runner cross-compiles to the target; we
          # validate the link step via `go build` but can't run tests.
          - { os: linux,   arch: amd64, runner: ubuntu-latest,    cargo_target: x86_64-unknown-linux-gnu,  native: true  }
          - { os: linux,   arch: arm64, runner: ubuntu-24.04-arm, cargo_target: aarch64-unknown-linux-gnu, native: true  }
          # Both darwin builds run on macos-14 (arm64 host). The arm64 build
          # is native; amd64 is cross-compiled — macOS toolchains bundle
          # both linkers, so one runner covers both targets. Cross outputs
          # can't run here (Rosetta doesn't help with `go test`'s
          # in-process forks), hence `native: false` for x86_64-apple-darwin.
          - { os: darwin,  arch: amd64, runner: macos-14,         cargo_target: x86_64-apple-darwin,       native: false }
          - { os: darwin,  arch: arm64, runner: macos-14,         cargo_target: aarch64-apple-darwin,      native: true  }
          # `gnu` (mingw-w64) rather than `msvc` so the produced .a is
          # ABI-compatible with Go's default cgo toolchain on Windows.
          - { os: windows, arch: amd64, runner: windows-latest,   cargo_target: x86_64-pc-windows-gnu,     native: true  }
    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target.cargo_target }}

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            packages/c/target/
          key: ${{ runner.os }}-${{ matrix.target.arch }}-c-${{ hashFiles('packages/c/Cargo.toml', 'packages/c/src/**', 'packages/core/Cargo.toml', 'packages/core/src/**') }}
          restore-keys: ${{ runner.os }}-${{ matrix.target.arch }}-c-

      - name: Build C ABI staticlib
        run: cargo build --release --manifest-path packages/c/Cargo.toml --target ${{ matrix.target.cargo_target }}

      # Stage straight into the package's lib/include layout so the
      # validation step below uses exactly the same paths the cgo build
      # tags reference. The same staged tree is what publish-go later
      # downloads + commits.
      - name: Stage staticlib + header into packages/go/
        shell: bash
        run: |
          PLATFORM=${{ matrix.target.os }}_${{ matrix.target.arch }}
          mkdir -p packages/go/lib/$PLATFORM packages/go/include
          cp packages/c/target/${{ matrix.target.cargo_target }}/release/libdatalogic_c.a packages/go/lib/$PLATFORM/
          cp packages/c/include/datalogic.h packages/go/include/

      # Native: full `go test` validates the link step + runtime behavior.
      # If a cgo file's LDFLAGS list is wrong, this step fails here rather
      # than after publish-go has already tagged a broken release.
      - name: Validate via go test (native)
        if: matrix.target.native
        shell: bash
        working-directory: packages/go
        run: go test -v ./...

      # Cross-compile case (darwin/amd64 from arm64 host): we can verify
      # the link step but not run the resulting binary. `go vet ./...` then
      # `go build ./...` confirms the cgo file parses and the static
      # library resolves all referenced symbols. The host's clang covers
      # the x86_64 cross via -arch.
      - name: Validate via go build (cross-compile)
        if: '!matrix.target.native'
        shell: bash
        working-directory: packages/go
        env:
          GOOS: ${{ matrix.target.os }}
          GOARCH: ${{ matrix.target.arch }}
          CGO_ENABLED: '1'
          CGO_CFLAGS: -arch x86_64
          CGO_LDFLAGS: -arch x86_64
        run: |
          go vet ./...
          go build -v ./...

      # Upload from packages/go/lib/ so the artifact tarball roots at
      # <os>_<arch>/libdatalogic_c.a. With download-artifact's
      # merge-multiple, all five tarballs flatten into one artifacts/
      # tree with five sibling <os>_<arch>/ subdirs.
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: go-staticlib-${{ matrix.target.os }}-${{ matrix.target.arch }}
          path: packages/go/lib/
          if-no-files-found: error

  publish-go:
    name: Publish Go module tag
    needs: [validate, publish-crate, go-build-staticlib]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # Need the full tag commit to base our synthetic release commit on.
          fetch-depth: 0

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Download all staticlibs
        uses: actions/download-artifact@v4
        with:
          path: artifacts/
          pattern: go-staticlib-*
          # merge-multiple: each artifact's tarball roots at <os>_<arch>/,
          # so merging puts every platform dir directly under artifacts/.
          merge-multiple: true

      - name: Stage staticlibs into packages/go/lib/
        run: |
          mkdir -p packages/go/lib
          for dir in artifacts/*/; do
            name=$(basename "$dir")
            mkdir -p "packages/go/lib/${name}"
            cp "${dir}/libdatalogic_c.a" "packages/go/lib/${name}/"
          done
          echo "Staged platform directories:"
          ls packages/go/lib/

      - name: Stage header into packages/go/include/
        # The cbindgen-generated header is platform-agnostic — it has no
        # #ifdef'd content — so we generate it once on this Linux runner
        # rather than collecting it from every matrix output.
        run: |
          cargo build --release --manifest-path packages/c/Cargo.toml
          mkdir -p packages/go/include
          cp packages/c/include/datalogic.h packages/go/include/

      - name: Commit and push Go module tag
        run: |
          VERSION="${{ needs.validate.outputs.version }}"
          TAG="packages/go/v${VERSION}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          # `-f` because packages/go/.gitignore excludes these dirs on main.
          # The release tag is the only place they ever exist in the tree.
          git add -f packages/go/lib/ packages/go/include/
          git commit -m "release(go): stage artifacts for ${TAG}"
          git tag "${TAG}"
          # Push only the tag — the synthetic commit becomes reachable
          # through it but never lands on a branch. Main stays binary-free.
          git push origin "${TAG}"
          echo "::notice::Go module tag pushed: ${TAG}. End consumers can now run 'go get github.com/GoPlasmatic/datalogic-rs/packages/go@v${VERSION}' (proxy.golang.org indexes the tag within a few minutes)."

  github-release:
    name: Create GitHub Release
    needs: [validate, publish-crate, publish-wasm, publish-ui, publish-python, publish-go]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create release
        run: |
          VERSION="${{ needs.validate.outputs.version }}"
          gh release create "v$VERSION" \
            --title "v$VERSION" \
            --generate-notes \
            --verify-tag
        env:
          GH_TOKEN: ${{ github.token }}
