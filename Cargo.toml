[package]
name = "datalogic-rs"
version = "5.0.0"
edition = "2024"
exclude = [".DS_Store", "/target", ".vscode", ".github", "/docs", "/wasm", "/ui", "pnpm-lock.yaml", "pnpm-workspace.yaml", "package.json", "test-wasm.cjs"]
authors = ["Harishankar Narayanan <nharishankar@gmail.com>"]
license = "Apache-2.0"
description = "A fast, type-safe Rust implementation of JSONLogic for evaluating logical rules as JSON. Perfect for business rules engines and dynamic filtering in Rust applications."
readme = "README.md"
homepage = "https://github.com/GoPlasmatic/datalogic-rs"
repository = "https://github.com/GoPlasmatic/datalogic-rs"
keywords = ["rules", "engine", "json", "logic"]
categories = ["data-structures", "development-tools", "parsing"]

[features]
# `compat` is on by default so existing 4.x callers compile unchanged. The
# `compat` module bridges `serde_json::Value` to the v5 `DataValue` /
# `OwnedDataValue` core. Drop it (`default-features = false`) for a fully
# serde_json-free build.
default = ["compat"]
compat = ["dep:serde_json", "datavalue/serde_json"]
preserve = []
datetime = ["datavalue/datetime", "dep:chrono"]
trace = ["compat"]
ext-string = []
ext-array = []
ext-control = []
error-handling = []
ext-math = []
wasm = ["datetime"]

[dependencies]
serde = { version = "1.0", features = ["derive"] }
serde_json = { version = "1.0", optional = true }
chrono = { version = "0.4.44", default-features = false, features = ["std", "clock"], optional = true }
datavalue = { package = "datavalue-rs", path = "../datavalue-rs", version = "0.1", features = ["serde"] }
bumpalo = { version = "3", features = ["collections"] }

[dev-dependencies]
tokio = { version = "1", features = ["full"] }
futures = "0.3"

# Examples that depend on opt-in features. With `default = []`, these only
# build when the user passes the matching `--features` (or `--all-features`).
[[example]]
name = "structured_objects"
required-features = ["preserve"]
