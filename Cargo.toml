[package]
name = "datalogic-rs"
version = "4.1.0"
edition = "2024"
exclude = [".DS_Store", "/target", ".vscode", ".github", "/docs", "/wasm", "/ui", "pnpm-lock.yaml", "pnpm-workspace.yaml", "package.json", "test-wasm.cjs"]
authors = ["Harishankar Narayanan <nharishankar@gmail.com>"]
license = "Apache-2.0"
description = "A fast, type-safe Rust implementation of JSONLogic for evaluating logical rules as JSON. Perfect for business rules engines and dynamic filtering in Rust applications."
readme = "README.md"
homepage = "https://github.com/GoPlasmatic/datalogic-rs"
repository = "https://github.com/GoPlasmatic/datalogic-rs"
keywords = ["rules", "engine", "json", "logic"]
categories = ["data-structures", "development-tools", "parsing"]

[features]
# Default is the minimal feature set needed to run `tests/suites/compatible.json`
# (the JSONLogic compatibility suite). Every other capability — datetime ops,
# error handling (try/throw), preserve_structure templating, and the ext-* op
# extensions (length/sort/slice/coalesce/switch/type/val/exists/abs/ceil/floor/
# starts_with/ends_with/upper/lower/trim/split) — is opt-in. This keeps the
# default arena-dispatch table small and the build cheap; users opt in via
# `features = ["..."]` (or `--all-features` for the full set).
default = []
preserve = []
datetime = ["dep:chrono"]
trace = []
ext-string = []
ext-array = []
ext-control = []
error-handling = []
ext-math = []
wasm = ["datetime", "chrono/wasmbind"]

[dependencies]
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
chrono = { version = "0.4.44", default-features = false, features = ["std", "clock"], optional = true }
regex = { version = "1.12.3", default-features = false, features = ["std", "perf", "unicode"] }
bumpalo = { version = "3", features = ["collections"] }

[dev-dependencies]
tokio = { version = "1", features = ["full"] }
futures = "0.3"

# Examples that depend on opt-in features. With `default = []`, these only
# build when the user passes the matching `--features` (or `--all-features`).
[[example]]
name = "structured_objects"
required-features = ["preserve"]
