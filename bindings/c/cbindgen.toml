# cbindgen configuration for datalogic-c (ABI v2).
#
# Regenerates `include/datalogic.h` on every `cargo build` via build.rs.
# Keep the surface here in sync with the Rust `extern "C"` functions in
# `src/`. If you add a public extern fn, no config change is needed —
# cbindgen discovers it automatically. New exported TYPES need an entry
# in `[export.rename]` below so consumers see `datalogic_*` names.

language = "C"
include_guard = "DATALOGIC_H"
cpp_compat = true
style = "type"
no_includes = false
sys_includes = ["stddef.h", "stdint.h"]
usize_is_size_t = true
autogen_warning = "/* This file is generated by cbindgen. Do not edit by hand — edit the Rust source in bindings/c/src/ and rerun `cargo build -p datalogic-c`. */"

header = """/* SPDX-License-Identifier: Apache-2.0
 *
 * datalogic.h — C ABI (v2) for the datalogic-rs JSONLogic engine.
 *
 * Contract summary
 * ----------------
 *  - ABI versioning: call `datalogic_abi_version()` once at load and
 *    require it to equal DATALOGIC_ABI_VERSION (2). A mismatch means a
 *    stale library and must abort initialisation.
 *  - Byte inputs are (pointer, length) UTF-8. NOT NUL-terminated.
 *  - Fallible calls return `datalogic_status` and take a trailing
 *    `datalogic_error **err`: pass NULL to skip error capture, else
 *    release the stored handle via `datalogic_error_free`. Error
 *    accessors return borrowed (ptr,len) bytes valid until that free.
 *  - Session results are BORROWED: `datalogic_session_evaluate*` point
 *    into a session-owned buffer valid until the next call touching the
 *    same session (any evaluate / reset / free). Copy before then.
 *  - One-shot results are OWNED `datalogic_buf` values released via
 *    `datalogic_buf_free`.
 *
 * Threading
 * ---------
 *  - `datalogic_engine`, `datalogic_rule`, `datalogic_data`, and
 *    `datalogic_traced_session` are thread-safe; share freely.
 *  - `datalogic_session` is NOT thread-safe; open one per thread.
 *  - `datalogic_error` handles are plain owned values; free from any
 *    thread.
 */"""

[export]
prefix = ""
item_types = ["constants", "enums", "structs", "opaque", "typedefs", "functions"]

# Rust types use Rust naming conventions; rename to C-style at the
# boundary so consumers see `datalogic_engine`, not `Engine`.
[export.rename]
"Engine" = "datalogic_engine"
"Rule" = "datalogic_rule"
"Session" = "datalogic_session"
"TracedSession" = "datalogic_traced_session"
"EngineBuilder" = "datalogic_engine_builder"
"Data" = "datalogic_data"
"Error" = "datalogic_error"
"Status" = "datalogic_status"
"Buf" = "datalogic_buf"
"Slice" = "datalogic_slice"
"OpResult" = "datalogic_op_result"
"DatalogicOpFn" = "datalogic_op_fn"

[enum]
rename_variants = "ScreamingSnakeCase"
prefix_with_name = true

[parse]
parse_deps = false

[fn]
prefix = ""
