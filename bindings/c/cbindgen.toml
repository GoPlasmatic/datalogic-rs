# cbindgen configuration for datalogic-c.
#
# Regenerates `include/datalogic.h` on every `cargo build` via build.rs.
# Keep the surface here in sync with the Rust `extern "C"` functions in
# `src/`. If you add a public extern fn, no config change is needed —
# cbindgen discovers it automatically.

language = "C"
include_guard = "DATALOGIC_H"
cpp_compat = true
style = "type"
no_includes = false
sys_includes = ["stddef.h", "stdint.h"]
autogen_warning = "/* This file is generated by cbindgen. Do not edit by hand — edit the Rust source in bindings/c/src/ and rerun `cargo build -p datalogic-c`. */"

header = """/* SPDX-License-Identifier: Apache-2.0
 *
 * datalogic.h — C ABI for the datalogic-rs JSONLogic engine.
 *
 * Threading & memory model
 * ------------------------
 *  - `datalogic_engine` and `datalogic_rule` handles are thread-safe;
 *    share across threads freely.
 *  - `datalogic_session` handles are NOT thread-safe; open one per thread.
 *  - Inputs (rule_json, data_json) are caller-owned, NUL-terminated UTF-8.
 *  - Functions returning `char*` transfer ownership — caller must release
 *    via `datalogic_string_free`. NULL is returned on error; query the
 *    thread-local last-error state for details.
 *  - `const char*` returned by `datalogic_last_error_*` and `datalogic_version`
 *    is borrowed; never free. The pointers returned by `datalogic_last_error_*`
 *    remain valid only until the next call on the current thread that
 *    mutates that state.
 */"""

[export]
prefix = ""
item_types = ["functions", "opaque"]

# Rust types use Rust naming conventions; rename to C-style at the
# boundary so consumers see `datalogic_engine`, not `Engine`.
[export.rename]
"Engine" = "datalogic_engine"
"Rule" = "datalogic_rule"
"Session" = "datalogic_session"

[parse]
parse_deps = false

[fn]
prefix = ""
