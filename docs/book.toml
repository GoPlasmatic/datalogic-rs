[book]
title = "datalogic-rs Documentation"
authors = ["Plasmatic"]
description = "High-performance Rust implementation of JSONLogic"
language = "en"
src = "src"

[build]
build-dir = "book"

[output.html]
site-url = "/datalogic-rs/"
git-repository-url = "https://github.com/GoPlasmatic/datalogic-rs"
default-theme = "navy"
preferred-dark-theme = "navy"
edit-url-template = "https://github.com/GoPlasmatic/datalogic-rs/edit/main/docs/{path}"
additional-js = ["theme/datalogic-playground.js"]
additional-css = ["theme/datalogic-playground.css", "theme/datalogic-theme.css"]

# Rust code blocks are not runnable on play.rust-lang.org (the crate is
# not available there), so hide the Run button.
[output.html.playground]
runnable = false

[output.html.fold]
enable = true
level = 1

# Redirects for pages moved in the 2026-07 docs restructure (Languages
# section promotion). Keys are old paths; values resolve relative to the
# old page location.
[output.html.redirect]
"/api/reference.html" = "../rust/api-reference.html"
"/ffi/jvm.html" = "../jvm.html"
"/ffi/dotnet.html" = "../dotnet.html"
"/ffi/php.html" = "../php.html"
"/ffi/overview.html" = "../c-abi.html"
"/ffi/memory-safety.html" = "../c-abi.html"
