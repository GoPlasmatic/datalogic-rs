[package]
name = "datalogic-rs"
version = "5.0.0"
edition.workspace = true
# Floor matches edition 2024 (stable in 1.85). Bump deliberately when a
# newer language feature is actually needed; downstream pinning depends on
# this staying conservative.
rust-version = "1.85"
license.workspace = true
authors.workspace = true
repository.workspace = true
homepage = "https://github.com/GoPlasmatic/datalogic-rs"
documentation = "https://docs.rs/datalogic-rs"
description = "A fast, type-safe Rust implementation of JSONLogic for evaluating logical rules as JSON. Perfect for business rules engines and dynamic filtering in Rust applications."
readme = "README.md"
keywords = ["rules", "engine", "json", "logic"]
categories = ["data-structures", "development-tools", "parsing"]
exclude = [".DS_Store"]

[features]
# Empty default: the crate is `serde_json`-free out of the box. Opt-in
# features below add interop, optional operators, or templating — see
# `compat`, `preserve`, `datetime`, `trace`, `error-handling`,
# `ext-string`, `ext-array`, `ext-control`, `ext-math`, `wasm`. Keeping
# `default = []` means a minimal build pulls only the JSONLogic baseline
# operators and no optional dependencies.
default = []
compat = ["dep:serde_json", "datavalue/serde_json"]
# `preserve` enables structure-preservation (templating) mode, where
# multi-key objects in compiled rules become output-shaping templates
# (`Engine::builder().preserve_structure(true)`). The 4.x JSONLogic
# `preserve` *operator* was removed in v5: literal scalars / arrays
# work inline already, and templated objects belong in
# preserve_structure mode.
preserve = []
datetime = ["datavalue/datetime", "dep:chrono"]
trace = ["compat"]
ext-string = []
ext-array = []
ext-control = []
error-handling = []
ext-math = []
wasm = ["datetime", "trace", "preserve"]

[dependencies]
serde = { version = "1.0", features = ["derive"] }
serde_json = { version = "1.0", optional = true }
chrono = { version = "0.4.44", default-features = false, features = ["std", "clock"], optional = true }
datavalue = { version = "0.2", package = "datavalue-rs", features = ["serde"] }
bumpalo = { version = "3", features = ["collections"] }

[dev-dependencies]
tokio = { version = "1", features = ["full"] }
futures = "0.3"
serde_json = "1.0"

# Examples that depend on opt-in features. With `default = []`, these only
# build when the user passes the matching `--features` (or `--all-features`).
[[example]]
name = "structured_objects"
required-features = ["preserve"]

[[example]]
name = "getting_started"
required-features = ["preserve"]

[[example]]
name = "error_handling"
required-features = ["error-handling"]

[[example]]
name = "tracing"
required-features = ["trace"]

[[example]]
name = "datetime_ops"
required-features = ["datetime"]

[[example]]
name = "migrating_from_v4"
# `compat` brings the v4 LegacyApi entry points (the migration target);
# `preserve` is needed for the v4 `preserve` operator → `preserve_structure`
# mode walkthrough at the end of the file.
required-features = ["compat", "preserve"]
