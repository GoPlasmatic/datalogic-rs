# `[workspace]` makes this crate its own workspace root so wasm-pack can
# apply the WASM-specific `[profile.release]` below (opt-level "z", lto,
# panic = "abort") without contaminating the rest of the monorepo. The
# parent `Cargo.toml` at the repo root excludes this path for the same
# reason.
[workspace]

[package]
name = "datalogic-wasm"
version = "4.0.21"
edition = "2024"
description = "WebAssembly bindings for datalogic-rs JSONLogic engine"
license = "Apache-2.0"
repository = "https://github.com/GoPlasmatic/datalogic-rs"

[package.metadata.wasm-pack.profile.release]
wasm-opt = false

[lib]
crate-type = ["cdylib", "rlib"]

[dependencies]
datalogic-rs = { path = "../core", features = ["wasm"] }
wasm-bindgen = "0.2"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
console_error_panic_hook = "0.1"
bumpalo = "3"

[dev-dependencies]
wasm-bindgen-test = "0.3"

[profile.release]
opt-level = "z"
lto = true
codegen-units = 1
panic = "abort"
strip = true
